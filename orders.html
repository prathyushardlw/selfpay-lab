<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .orders-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .orders-header h2 { font-size: 18px; color: #064e3b; }
    .admin-shell { display: grid; gap: 20px; }
    .admin-section { border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; background: #fff; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05); }
    .section-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
    .section-header h3 { margin: 0; font-size: 16px; color: #064e3b; }
    .section-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .order-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .order-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .order-id { font-weight: 700; color: #064e3b; }
    .order-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
    .order-status.paid { background: #d1fae5; color: #065f46; }
    .order-status.pending { background: #fef3c7; color: #92400e; }
    .order-status.unpaid { background: #fee2e2; color: #991b1b; }
    .order-info { font-size: 13px; color: #555; }
    .order-info span { margin-right: 16px; }
    .order-tests { font-size: 12px; color: #666; margin-top: 6px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .order-actions { margin-top: 10px; }
    .order-actions button { font-size: 12px; padding: 4px 12px; margin-right: 6px; }
    .admin-note { margin-bottom: 16px; color: #555; font-size: 13px; }
    .status-message { margin: 0 0 14px; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
    .status-message.info { background: #eff6ff; color: #1d4ed8; }
    .status-message.success { background: #dcfce7; color: #166534; }
    .status-message.error { background: #fee2e2; color: #991b1b; }
    .catalog-grid { display: grid; gap: 10px; }
    .catalog-row { display: grid; grid-template-columns: minmax(220px, 2fr) 120px minmax(180px, 1.5fr) 90px; gap: 10px; align-items: center; }
    .catalog-row.catalog-head { font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.04em; }
    .catalog-row input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 10px; font: inherit; }
    .catalog-row button { white-space: nowrap; }
    .catalog-add { margin-top: 14px; padding-top: 14px; border-top: 1px solid #e2e8f0; }
    .catalog-help { font-size: 12px; color: #64748b; margin: 8px 0 0; }
    @media (max-width: 820px) {
      .orders-header, .section-header { flex-direction: column; align-items: stretch; }
      .catalog-row { grid-template-columns: 1fr; }
      .catalog-row.catalog-head { display: none; }
    }
  </style>
</head>
<body>
  <div class="brand-bar">
    <div class="brand-bar-inner">
      <h1 class="brand-title">Self Pay Lab Registration</h1>
    </div>
  </div>

  <div class="container">
    <div class="orders-header">
      <h2>Admin Portal</h2>
      <div>
        <button class="btn btn-cancel" id="changeTokenBtn" type="button">Change Token</button>
        <button class="btn btn-pay" id="downloadCsvBtn" type="button">Download CSV</button>
      </div>
    </div>
    <div class="admin-shell">
      <section class="admin-section">
        <div class="section-header">
          <div>
            <h3>Test Catalog</h3>
            <p class="admin-note">Add, edit, or remove tests here. The patient form and Stripe checkout will both use this saved catalog.</p>
          </div>
          <div class="section-actions">
            <button class="btn btn-cancel" id="reloadCatalogBtn" type="button">Reload Tests</button>
            <button class="btn btn-pay" id="saveCatalogBtn" type="button">Save Tests</button>
          </div>
        </div>
        <div id="catalogMessage"></div>
        <div id="catalogEditor"></div>
      </section>

      <section class="admin-section">
        <div class="section-header">
          <div>
            <h3>Payment Summary</h3>
            <p class="admin-note">This section shows verified Stripe checkout sessions. It does not treat a redirect as proof of payment.</p>
          </div>
        </div>
        <div id="ordersList"></div>
      </section>
    </div>
  </div>

  <script>
    const ADMIN_TOKEN_STORAGE_KEY = 'selfpay_admin_token';
    let allOrders = [];
    let catalogTests = [];

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatAmount(amountTotal, currency) {
      if (typeof amountTotal !== 'number') {
        return 'N/A';
      }

      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: (currency || 'usd').toUpperCase()
      }).format(amountTotal / 100);
    }

    function formatDate(unixTimestamp) {
      if (!unixTimestamp) {
        return 'N/A';
      }

      return new Date(unixTimestamp * 1000).toLocaleString();
    }

    function normalizeStatus(order) {
      if (order.paymentStatus === 'paid') {
        return { className: 'paid', label: 'PAID' };
      }

      if (order.paymentStatus === 'unpaid' || order.checkoutStatus === 'expired') {
        return { className: 'unpaid', label: (order.paymentStatus || order.checkoutStatus || 'UNPAID').toUpperCase() };
      }

      return { className: 'pending', label: (order.paymentStatus || order.checkoutStatus || 'PENDING').toUpperCase() };
    }

    function getStoredToken() {
      return sessionStorage.getItem(ADMIN_TOKEN_STORAGE_KEY) || '';
    }

    function requestAdminToken(forcePrompt = false) {
      const existing = getStoredToken();
      if (existing && !forcePrompt) {
        return existing;
      }

      const token = window.prompt('Enter the admin access token configured in ADMIN_ACCESS_TOKEN');
      if (!token) {
        return '';
      }

      sessionStorage.setItem(ADMIN_TOKEN_STORAGE_KEY, token.trim());
      return token.trim();
    }

    function setCatalogMessage(message, type) {
      const messageEl = document.getElementById('catalogMessage');
      if (!message) {
        messageEl.innerHTML = '';
        return;
      }

      messageEl.innerHTML = `<div class="status-message ${type}">${escapeHtml(message)}</div>`;
    }

    async function fetchWithAdmin(path, options = {}) {
      const token = requestAdminToken();

      if (!token) {
        throw new Error('Admin token is required.');
      }

      const response = await fetch(path, {
        ...options,
        headers: {
          ...(options.headers || {}),
          Authorization: `Bearer ${token}`
        }
      });

      const data = await response.json();

      if (response.status === 401) {
        sessionStorage.removeItem(ADMIN_TOKEN_STORAGE_KEY);
        throw new Error('Admin token was rejected.');
      }

      if (!response.ok) {
        throw new Error(data.error || 'Request failed.');
      }

      return data;
    }

    async function loadCatalog() {
      const response = await fetch('/.netlify/functions/get-test-catalog');
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Unable to load test catalog.');
      }

      catalogTests = data.map((test) => ({ ...test }));
      return catalogTests;
    }

    function renderCatalogEditor() {
      const container = document.getElementById('catalogEditor');

      if (!catalogTests.length) {
        container.innerHTML = '<div class="empty-state"><p>No tests configured yet.</p></div>';
        return;
      }

      container.innerHTML = `
        <div class="catalog-grid">
          <div class="catalog-row catalog-head">
            <div>Test Name</div>
            <div>Price</div>
            <div>Tube</div>
            <div>Action</div>
          </div>
          ${catalogTests.map((test, index) => `
            <div class="catalog-row" data-index="${index}">
              <input type="text" class="catalog-field" data-field="name" data-index="${index}" value="${escapeHtml(test.name)}" placeholder="Test name">
              <input type="number" class="catalog-field" data-field="price" data-index="${index}" value="${Number(test.price).toFixed(2)}" min="0" step="0.01" placeholder="0.00">
              <input type="text" class="catalog-field" data-field="tube" data-index="${index}" value="${escapeHtml(test.tube)}" placeholder="Tube type">
              <button type="button" class="btn btn-cancel remove-test-btn" data-index="${index}">Remove</button>
            </div>
          `).join('')}
        </div>
        <div class="catalog-add">
          <div class="catalog-row">
            <input type="text" id="newTestName" placeholder="New test name">
            <input type="number" id="newTestPrice" min="0" step="0.01" placeholder="Price">
            <input type="text" id="newTestTube" placeholder="Tube type">
            <button type="button" class="btn btn-pay" id="addTestBtn">Add Test</button>
          </div>
          <p class="catalog-help">Use Save Tests after any add, edit, or remove action.</p>
        </div>
      `;

      container.querySelectorAll('.catalog-field').forEach((input) => {
        input.addEventListener('input', (event) => {
          const index = Number(event.target.dataset.index);
          const field = event.target.dataset.field;
          const value = field === 'price' ? event.target.value : event.target.value;
          catalogTests[index][field] = value;
        });
      });

      container.querySelectorAll('.remove-test-btn').forEach((button) => {
        button.addEventListener('click', () => {
          const index = Number(button.dataset.index);
          catalogTests.splice(index, 1);
          renderCatalogEditor();
          setCatalogMessage('Removed test locally. Save Tests to persist the change.', 'info');
        });
      });

      document.getElementById('addTestBtn').addEventListener('click', () => {
        const nameInput = document.getElementById('newTestName');
        const priceInput = document.getElementById('newTestPrice');
        const tubeInput = document.getElementById('newTestTube');

        const newTest = {
          name: nameInput.value.trim(),
          price: priceInput.value,
          tube: tubeInput.value.trim()
        };

        if (!newTest.name || !newTest.tube || newTest.price === '') {
          setCatalogMessage('Enter name, price, and tube before adding a test.', 'error');
          return;
        }

        catalogTests.push(newTest);
        renderCatalogEditor();
        setCatalogMessage('Added test locally. Save Tests to persist the change.', 'info');
      });
    }

    function buildValidatedCatalog() {
      if (!catalogTests.length) {
        throw new Error('The catalog must contain at least one test.');
      }

      const seenNames = new Set();

      return catalogTests.map((test) => {
        const name = String(test.name || '').trim();
        const tube = String(test.tube || '').trim();
        const price = Number(test.price);

        if (!name) {
          throw new Error('Every test needs a name.');
        }

        if (!tube) {
          throw new Error(`Test "${name}" needs a tube type.`);
        }

        if (!Number.isFinite(price) || price < 0) {
          throw new Error(`Test "${name}" needs a valid non-negative price.`);
        }

        const lookupKey = name.toLowerCase();
        if (seenNames.has(lookupKey)) {
          throw new Error(`Duplicate test name: ${name}`);
        }

        seenNames.add(lookupKey);
        return {
          name,
          price: Math.round(price * 100) / 100,
          tube
        };
      });
    }

    async function saveCatalog() {
      const tests = buildValidatedCatalog();
      const savedCatalog = await fetchWithAdmin('/.netlify/functions/update-test-catalog', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tests })
      });

      catalogTests = savedCatalog.map((test) => ({ ...test }));
      renderCatalogEditor();
      setCatalogMessage('Test catalog saved. The registration form will use the updated list.', 'success');
    }

    async function loadOrders() {
      allOrders = await fetchWithAdmin('/.netlify/functions/list-payments');
      return allOrders;
    }

    async function renderOrders() {
      const container = document.getElementById('ordersList');

      try {
        const orders = await loadOrders();

        if (orders.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No Stripe checkout sessions found.</p></div>';
          return;
        }

        container.innerHTML = orders.map(order => {
          const status = normalizeStatus(order);
          return `
            <div class="order-card">
              <div class="order-card-header">
                <span class="order-id">${order.orderId}</span>
                <span class="order-status ${status.className}">${status.label}</span>
              </div>
              <div class="order-info">
                <span><strong>${order.customerEmail || 'No email'}</strong></span>
                <span>${formatAmount(order.amountTotal, order.currency)}</span>
                <span>${formatDate(order.created)}</span>
              </div>
              <div class="order-tests">Stripe session: ${order.sessionId}</div>
              <div class="order-tests">Transaction ID: ${order.paymentIntentId || 'Pending'}</div>
              <div class="order-tests">Checkout: ${(order.checkoutStatus || 'unknown').toUpperCase()} | Payment: ${(order.paymentStatus || 'unknown').toUpperCase()}</div>
            </div>
          `;
        }).join('');
      } catch (error) {
        container.innerHTML = `<div class="empty-state"><p>${error.message}</p></div>`;
      }
    }

    function downloadCSV() {
      if (allOrders.length === 0) { alert('No orders to download.'); return; }

      const headers = ['Order ID','Customer Email','Amount','Currency','Checkout Status','Payment Status','Stripe Session','Transaction ID','Created'];
      const rows = allOrders.map(o => [
        o.orderId,
        o.customerEmail || '',
        typeof o.amountTotal === 'number' ? (o.amountTotal / 100).toFixed(2) : '',
        (o.currency || 'usd').toUpperCase(),
        o.checkoutStatus || '',
        o.paymentStatus || '',
        o.sessionId || '',
        o.paymentIntentId || '',
        formatDate(o.created)
      ]);

      let csv = headers.join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(v => `"${(v || '').replace(/"/g, '""')}"`).join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');
      link.download = 'testgo-orders.csv';
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadCatalog()
        .then(renderCatalogEditor)
        .catch((error) => setCatalogMessage(error.message, 'error'));

      renderOrders();
      document.getElementById('downloadCsvBtn').addEventListener('click', downloadCSV);
      document.getElementById('reloadCatalogBtn').addEventListener('click', () => {
        setCatalogMessage('Reloading test catalog...', 'info');
        loadCatalog()
          .then(() => {
            renderCatalogEditor();
            setCatalogMessage('Loaded the latest saved test catalog.', 'success');
          })
          .catch((error) => setCatalogMessage(error.message, 'error'));
      });
      document.getElementById('saveCatalogBtn').addEventListener('click', () => {
        saveCatalog().catch((error) => setCatalogMessage(error.message, 'error'));
      });
      document.getElementById('changeTokenBtn').addEventListener('click', () => {
        sessionStorage.removeItem(ADMIN_TOKEN_STORAGE_KEY);
        renderOrders();
      });
    });
  </script>
</body>
</html>
