<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .orders-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .orders-header h2 { font-size: 18px; color: #064e3b; }
    .order-card { border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .order-card-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .order-id { font-weight: 700; color: #064e3b; }
    .order-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
    .order-status.paid { background: #d1fae5; color: #065f46; }
    .order-status.pending { background: #fef3c7; color: #92400e; }
    .order-info { font-size: 13px; color: #555; }
    .order-info span { margin-right: 16px; }
    .order-tests { font-size: 12px; color: #666; margin-top: 6px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .order-actions { margin-top: 10px; }
    .order-actions button { font-size: 12px; padding: 4px 12px; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="brand-bar">
    <div class="brand-bar-inner">
      <h1 class="brand-title">Self Pay Lab Registration</h1>
    </div>
  </div>

  <div class="container">
    <div class="orders-header">
      <h2>Submitted Orders</h2>
      <button class="btn btn-pay" id="downloadCsvBtn">Download CSV</button>
    </div>
    <div id="ordersList"></div>
  </div>

  <script>
    let allOrders = [];

    async function loadOrders() {
      try {
        const res = await fetch('/.netlify/functions/get-orders');
        if (res.ok) {
          allOrders = await res.json();
          return allOrders;
        }
      } catch (e) {}
      // Fallback to localStorage
      allOrders = JSON.parse(localStorage.getItem('testgo_orders') || '[]');
      return allOrders;
    }

    async function renderOrders() {
      const orders = await loadOrders();
      const container = document.getElementById('ordersList');

      if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No orders submitted yet.</p></div>';
        return;
      }

      container.innerHTML = orders.map(order => {
        const status = order.status === 'paid' ? 'paid' : 'pending';
        const statusLabel = status === 'paid' ? 'PAID' : 'PENDING';
        return `
          <div class="order-card">
            <div class="order-card-header">
              <span class="order-id">${order.orderId}</span>
              <span class="order-status ${status}">${statusLabel}</span>
            </div>
            <div class="order-info">
              <span><strong>${order.firstName} ${order.lastName}</strong></span>
              <span>DOB: ${order.dob}</span>
              <span>$${order.total.toFixed(2)}</span>
            </div>
            <div class="order-tests">Tests: ${order.tests.map(t => t.name).join(', ')}</div>
            <div class="order-actions">
              <button class="btn btn-cancel" onclick="printLabel('${order.orderId}')">Print Label</button>
              <button class="btn btn-cancel" onclick="printInvoice('${order.orderId}')">Print Invoice</button>
            </div>
          </div>
        `;
      }).reverse().join('');
    }

    function printLabel(orderId) {
      const order = allOrders.find(o => o.orderId === orderId);
      if (!order) return;
      const w = window.open('', '_blank', 'width=400,height=250');
      w.document.write(`<html><head><title>Label</title><style>body{margin:0;padding:16px;font-family:Arial,sans-serif;}.label{border:2px solid #000;padding:12px 16px;display:inline-block;}.label-name{font-size:18px;font-weight:bold;margin-bottom:4px;}.label-dob{font-size:14px;}.label-id{font-size:11px;color:#666;margin-top:4px;}</style></head><body><div class="label"><div class="label-name">${order.lastName}, ${order.firstName}</div><div class="label-dob">DOB: ${order.dob}</div><div class="label-id">${order.orderId}</div></div><script>window.onload=function(){window.print();}<\/script></body></html>`);
      w.document.close();
    }

    function printInvoice(orderId) {
      const order = allOrders.find(o => o.orderId === orderId);
      if (!order) return;
      let rows = order.tests.map(t => `<tr><td>${t.name}</td><td style="text-align:right">$${t.price.toFixed(2)}</td></tr>`).join('');
      const w = window.open('', '_blank', 'width=600,height=700');
      w.document.write(`<html><head><title>Invoice</title><style>body{margin:0;padding:24px;font-family:Arial,sans-serif;font-size:13px;}h2{margin:0 0 4px;font-size:18px;}.sub{color:#666;margin-bottom:16px;font-size:12px;}.info{margin-bottom:16px;}.info p{margin:2px 0;}table{width:100%;border-collapse:collapse;margin-bottom:12px;}th,td{padding:6px 8px;border-bottom:1px solid #ddd;text-align:left;}th{background:#f5f5f5;font-weight:600;}.tot td{border-top:2px solid #333;font-weight:bold;font-size:14px;}.ft{margin-top:20px;font-size:11px;color:#888;}</style></head><body><h2>Self Pay Invoice</h2><div class="sub">Order: ${order.orderId} | Date: ${order.paidAt || order.submittedAt || ''}</div><div class="info"><p><strong>Patient:</strong> ${order.firstName} ${order.lastName}</p><p><strong>DOB:</strong> ${order.dob}</p><p><strong>Email:</strong> ${order.email}</p><p><strong>Phone:</strong> ${order.phone}</p></div><table><thead><tr><th>Test</th><th style="text-align:right">Amount</th></tr></thead><tbody>${rows}<tr class="tot"><td>Total</td><td style="text-align:right">$${order.total.toFixed(2)}</td></tr></tbody></table><div class="ft">Thank you for your visit.</div><script>window.onload=function(){window.print();}<\/script></body></html>`);
      w.document.close();
    }

    function downloadCSV() {
      if (allOrders.length === 0) { alert('No orders to download.'); return; }

      const headers = ['Order ID','First Name','Last Name','DOB','Email','Phone','Gender','Address','City','State','Zip','Tests','Total','Status','Submitted'];
      const rows = allOrders.map(o => [
        o.orderId, o.firstName, o.lastName, o.dob, o.email, o.phone,
        o.gender, o.address, o.city, o.state, o.zipcode,
        o.tests.map(t => t.name).join('; '),
        o.total.toFixed(2),
        o.status || 'pending',
        o.submittedAt || ''
      ]);

      let csv = headers.join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(v => `"${(v || '').replace(/"/g, '""')}"`).join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const link = document.createElement('a');
      link.download = 'testgo-orders.csv';
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderOrders();
      document.getElementById('downloadCsvBtn').addEventListener('click', downloadCSV);
    });
  </script>
</body>
</html>
