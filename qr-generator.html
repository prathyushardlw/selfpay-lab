<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TestGO - QR Code Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .brand-bar {
      background: #064e3b;
      padding: 20px 0;
      width: 100%;
      text-align: center;
    }
    .brand-bar img { max-height: 70px; }
    .container {
      background: #fff;
      max-width: 500px;
      width: 100%;
      margin: 30px auto;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }
    h2 { font-size: 20px; color: #064e3b; margin-bottom: 8px; }
    p.desc { font-size: 13px; color: #666; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #2c3e50; margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-group input:focus { outline: none; border-color: #059669; box-shadow: 0 0 0 2px rgba(5,150,105,0.1); }
    #qrPreview {
      margin: 20px auto;
      padding: 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      display: none;
    }
    #qrPreview canvas { display: block; margin: 0 auto; }
    .btn {
      padding: 12px 36px;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin: 6px;
    }
    .btn-generate { background: #059669; color: #fff; }
    .btn-generate:hover { background: #047857; }
    .btn-download { background: #fff; color: #059669; border: 1px solid #059669; }
    .btn-download:hover { background: #ecfdf5; }
    .btn-download:disabled { opacity: 0.4; cursor: not-allowed; }
    .actions { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="brand-bar">
    <img src="logo.png" alt="TestGO">
  </div>

  <div class="container">
    <h2>QR Code Generator</h2>
    <p class="desc">Generate a downloadable QR code that patients can scan to open the Self-Pay registration form.</p>

    <div class="form-group">
      <label for="urlInput">Registration Page URL:</label>
      <input type="url" id="urlInput" placeholder="https://your-domain.com/index.html">
    </div>

    <div class="actions">
      <button class="btn btn-generate" id="generateBtn">Generate QR Code</button>
    </div>

    <div id="qrPreview">
      <canvas id="qrCanvas"></canvas>
    </div>

    <div class="actions">
      <button class="btn btn-download" id="downloadPngBtn" disabled>Download PNG</button>
      <button class="btn btn-download" id="downloadSvgBtn" disabled>Download SVG</button>
    </div>
  </div>

  <script>
    // QR Code generation (lightweight implementation)
    const QR = (() => {
      // QR Code generator using canvas - supports up to ~100 chars reliably
      // Uses error correction level M

      function generateMatrix(text) {
        // We'll use the QR code API via canvas drawing
        // For a self-contained solution, generate using a minimal QR encoder
        const size = Math.max(21, Math.ceil(text.length / 8) * 4 + 21);
        return { text, size };
      }

      function render(canvas, text, cellSize = 8) {
        const img = new Image();
        // Use a reliable QR generation approach via SVG path data
        const encoded = encodeURIComponent(text);
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encoded}&format=svg`;

        return fetch(qrApiUrl)
          .then(r => r.text())
          .then(svgText => {
            // Draw SVG to canvas
            const blob = new Blob([svgText], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            return new Promise((resolve) => {
              img.onload = () => {
                canvas.width = 300;
                canvas.height = 300;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, 300, 300);
                ctx.drawImage(img, 0, 0, 300, 300);
                URL.revokeObjectURL(url);
                resolve(svgText);
              };
              img.src = url;
            });
          });
      }

      return { render };
    })();

    let svgData = null;

    document.getElementById('generateBtn').addEventListener('click', () => {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) {
        alert('Please enter a URL.');
        return;
      }

      const canvas = document.getElementById('qrCanvas');
      const preview = document.getElementById('qrPreview');
      preview.style.display = 'block';

      QR.render(canvas, url).then((svg) => {
        svgData = svg;
        document.getElementById('downloadPngBtn').disabled = false;
        document.getElementById('downloadSvgBtn').disabled = false;
      }).catch(() => {
        alert('Failed to generate QR code. Check your internet connection.');
      });
    });

    document.getElementById('downloadPngBtn').addEventListener('click', () => {
      const canvas = document.getElementById('qrCanvas');
      const link = document.createElement('a');
      link.download = 'testgo-qr-code.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    document.getElementById('downloadSvgBtn').addEventListener('click', () => {
      if (!svgData) return;
      const blob = new Blob([svgData], { type: 'image/svg+xml' });
      const link = document.createElement('a');
      link.download = 'testgo-qr-code.svg';
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    });
  </script>
</body>
</html>
