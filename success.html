<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Status</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="brand-bar">
    <div class="brand-bar-inner">
      <h1 class="brand-title">Self Pay Lab Registration</h1>
    </div>
  </div>

  <div class="container">
    <div class="confirmation-screen">
      <div class="confirm-icon" id="confirmIcon">&#9203;</div>
      <h2 class="confirm-title" id="confirmTitle">Checking Payment Status...</h2>
      <p id="statusMessage" style="text-align:center;color:#555;margin-bottom:18px;">Please wait while we verify your Stripe payment.</p>
      <div class="order-details" id="orderDetails">
        <p style="text-align:center;color:#666;">Loading order details...</p>
      </div>
      <div class="tube-section" id="tubeSection"></div>
      <div class="print-actions">
        <button type="button" class="btn btn-pay btn-full" id="printLabelBtn">&#128424; Print Label</button>
        <button type="button" class="btn btn-cancel btn-full" id="printInvoiceBtn">&#128424; Print Invoice</button>
      </div>
      <div style="text-align:center;margin-top:16px;">
        <a href="/index.html" class="btn btn-pay" style="display:inline-block;text-decoration:none;">Place New Order</a>
      </div>
    </div>
  </div>

  <script>
    const CURRENT_ORDER_STORAGE_KEY = 'testgo_current_order';
    const tubeColors = {
      "Lavender": "#9b59b6",
      "Green": "#27ae60",
      "Red": "#e74c3c",
      "Yellow (Urine Cup)": "#f1c40f"
    };

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function loadStoredOrder() {
      try {
        const raw = sessionStorage.getItem(CURRENT_ORDER_STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function saveStoredOrder(order) {
      sessionStorage.setItem(CURRENT_ORDER_STORAGE_KEY, JSON.stringify(order));
    }

    function formatAmount(amountInCents, fallbackAmount) {
      if (typeof amountInCents === 'number') {
        return `$${(amountInCents / 100).toFixed(2)}`;
      }

      return typeof fallbackAmount === 'number' ? `$${fallbackAmount.toFixed(2)}` : 'N/A';
    }

    function formatPaymentTime(unixTimestamp) {
      if (!unixTimestamp) {
        return '';
      }

      return new Date(unixTimestamp * 1000).toLocaleString();
    }

    function setVerificationState(verification) {
      const icon = document.getElementById('confirmIcon');
      const title = document.getElementById('confirmTitle');
      const message = document.getElementById('statusMessage');

      if (verification.paymentStatus === 'paid') {
        icon.innerHTML = '&#10004;';
        title.textContent = 'Payment Confirmed';
        message.textContent = 'Stripe reports this payment as paid.';
        message.style.color = '#065f46';
        return;
      }

      icon.innerHTML = '&#9888;';
      title.textContent = 'Payment Not Confirmed';
      message.textContent = `Stripe reports checkout status ${verification.checkoutStatus || 'unknown'} and payment status ${verification.paymentStatus || 'unknown'}.`;
      message.style.color = '#92400e';
    }

    function renderVerificationDetails(order, verification) {
      const details = document.getElementById('orderDetails');
      const displayName = order ? `${order.firstName} ${order.lastName}` : 'Not available on this device';
      const tests = order && Array.isArray(order.tests) && order.tests.length > 0 ? order.tests.map(t => t.name).join(', ') : 'Not available on this device';
      const paidAt = formatPaymentTime(verification.created);
      const amount = formatAmount(verification.amountTotal, order && order.total);
      const isPaid = verification.paymentStatus === 'paid';
      const statusColor = isPaid ? '#059669' : '#b45309';
      const statusLabel = isPaid ? 'PAID' : (verification.paymentStatus || 'UNKNOWN').toUpperCase();

      let html = '';
      html += `<div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value">${verification.orderId || order?.orderId || 'N/A'}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Patient</span><span class="detail-value">${displayName}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${verification.customerEmail || order?.email || 'N/A'}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Tests</span><span class="detail-value">${tests}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value" style="color:${statusColor};font-weight:700;">${amount}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:${statusColor};font-weight:700;">${statusLabel}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Stripe Session</span><span class="detail-value">${verification.sessionId || 'N/A'}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Transaction ID</span><span class="detail-value">${verification.paymentIntentId || 'N/A'}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Processed</span><span class="detail-value">${paidAt || 'Pending'}</span></div>`;
      details.innerHTML = html;
    }

    function renderOrderTubes(order) {
      const tubeSection = document.getElementById('tubeSection');

      if (!order || !Array.isArray(order.tests) || order.tests.length === 0) {
        tubeSection.innerHTML = '<p style="text-align:center;color:#666;">Tube details are only available on the device where the order was created.</p>';
        return;
      }

      const tubesNeeded = {};
      order.tests.forEach(t => {
        if (!tubesNeeded[t.tube]) tubesNeeded[t.tube] = [];
        tubesNeeded[t.tube].push(t.name);
      });

      let tubeHtml = '<h3>Tubes Required</h3>';
      Object.keys(tubesNeeded).forEach(tube => {
        const color = tubeColors[tube] || '#999';
        tubeHtml += `<div class="tube-item"><span class="tube-color" style="background:${color}"></span><span><strong>${tube}</strong> - ${tubesNeeded[tube].join(', ')}</span></div>`;
      });
      tubeSection.innerHTML = tubeHtml;
    }

    async function fetchVerification() {
      const orderId = getQueryParam('order_id');
      const sessionId = getQueryParam('session_id');

      if (!sessionId) {
        throw new Error('Missing Stripe session ID in the success URL.');
      }

      const params = new URLSearchParams({ session_id: sessionId });
      if (orderId) {
        params.set('order_id', orderId);
      }

      const response = await fetch(`/.netlify/functions/get-payment-status?${params.toString()}`);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Unable to verify payment status.');
      }

      return data;
    }

    function updateStoredOrder(order, verification) {
      if (!order || order.orderId !== verification.orderId) {
        return order;
      }

      const nextOrder = {
        ...order,
        status: verification.paymentStatus,
        stripeSessionId: verification.sessionId,
        transactionId: verification.paymentIntentId || null,
        paidAt: verification.paymentStatus === 'paid' ? formatPaymentTime(verification.created) : order.paidAt || ''
      };

      saveStoredOrder(nextOrder);
      return nextOrder;
    }

    function printLabel(order) {
      const printWindow = window.open('', '_blank', 'width=400,height=250');
      printWindow.document.write(`<html><head><title>Patient Label</title>
        <style>body{margin:0;padding:16px;font-family:Arial,sans-serif;}.label{border:2px solid #000;padding:12px 16px;display:inline-block;}.label-name{font-size:18px;font-weight:bold;margin-bottom:4px;}.label-dob{font-size:14px;color:#333;}.label-id{font-size:11px;color:#666;margin-top:4px;}</style></head>
        <body><div class="label"><div class="label-name">${order.lastName}, ${order.firstName}</div><div class="label-dob">DOB: ${order.dob}</div><div class="label-id">${order.orderId}</div></div>
        <script>window.onload=function(){window.print();}<\/script></body></html>`);
      printWindow.document.close();
    }

    function printInvoice(order) {
      let testsRows = order.tests.map(t => `<tr><td>${t.name}</td><td style="text-align:right">$${t.price.toFixed(2)}</td></tr>`).join('');
      const printWindow = window.open('', '_blank', 'width=600,height=700');
      printWindow.document.write(`<html><head><title>Invoice - ${order.orderId}</title>
        <style>body{margin:0;padding:24px;font-family:Arial,sans-serif;font-size:13px;color:#333;}h2{margin:0 0 4px;font-size:18px;}.subtitle{color:#666;margin-bottom:16px;font-size:12px;}.info{margin-bottom:16px;}.info p{margin:2px 0;}table{width:100%;border-collapse:collapse;margin-bottom:12px;}th,td{padding:6px 8px;border-bottom:1px solid #ddd;text-align:left;}th{background:#f5f5f5;font-weight:600;}.total-row td{border-top:2px solid #333;font-weight:bold;font-size:14px;}.footer{margin-top:20px;font-size:11px;color:#888;}</style></head>
        <body><h2>Self Pay Invoice</h2><div class="subtitle">Order: ${order.orderId} | Date: ${order.paidAt || ''} | Transaction: ${order.transactionId || 'N/A'}</div>
        <div class="info"><p><strong>Patient:</strong> ${order.firstName} ${order.lastName}</p><p><strong>DOB:</strong> ${order.dob}</p><p><strong>Email:</strong> ${order.email}</p><p><strong>Phone:</strong> ${order.phone}</p></div>
        <table><thead><tr><th>Test</th><th style="text-align:right">Amount</th></tr></thead><tbody>${testsRows}<tr class="total-row"><td>Total</td><td style="text-align:right">$${order.total.toFixed(2)}</td></tr></tbody></table>
        <div class="footer">Thank you for your visit.</div>
        <script>window.onload=function(){window.print();}<\/script></body></html>`);
      printWindow.document.close();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const printLabelBtn = document.getElementById('printLabelBtn');
      const printInvoiceBtn = document.getElementById('printInvoiceBtn');
      let order = loadStoredOrder();
      const paymentType = getQueryParam('payment_type');

      printLabelBtn.disabled = true;
      printInvoiceBtn.disabled = true;

      // Pay Later flow - no Stripe verification needed
      if (paymentType === 'pay-later') {
        document.getElementById('confirmIcon').innerHTML = '&#10004;';
        document.getElementById('confirmTitle').textContent = 'Order Submitted';
        const statusMessage = document.getElementById('statusMessage');
        statusMessage.textContent = 'Your order has been received. You can pay later during your visit. A confirmation email has been sent.';
        statusMessage.style.color = '#065f46';

        if (order) {
          const details = document.getElementById('orderDetails');
          let html = '';
          html += `<div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value">${order.orderId}</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Patient</span><span class="detail-value">${order.firstName} ${order.lastName}</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${order.email}</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Tests</span><span class="detail-value">${order.tests.map(t => t.name).join(', ')}</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value" style="color:#d97706;font-weight:700;">$${order.total.toFixed(2)}</span></div>`;
          html += `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:#d97706;font-weight:700;">PAY LATER</span></div>`;
          details.innerHTML = html;
          renderOrderTubes(order);

          printLabelBtn.disabled = false;
          printInvoiceBtn.disabled = false;
          printLabelBtn.addEventListener('click', () => printLabel(order));
          printInvoiceBtn.addEventListener('click', () => printInvoice(order));
        }
        return;
      }

      // Pay Now flow - verify with Stripe
      try {
        const verification = await fetchVerification();
        setVerificationState(verification);
        order = updateStoredOrder(order, verification);
        renderVerificationDetails(order, verification);
        renderOrderTubes(order);

        if (verification.paymentStatus === 'paid' && order) {
          printLabelBtn.disabled = false;
          printInvoiceBtn.disabled = false;
          printLabelBtn.addEventListener('click', () => printLabel(order));
          printInvoiceBtn.addEventListener('click', () => printInvoice(order));
        }
      } catch (error) {
        document.getElementById('confirmIcon').innerHTML = '&#9888;';
        document.getElementById('confirmTitle').textContent = 'Payment Verification Failed';
        const statusMessage = document.getElementById('statusMessage');
        statusMessage.textContent = error.message;
        statusMessage.style.color = '#b91c1c';
        document.getElementById('orderDetails').innerHTML = '<p style="text-align:center;color:#c00;">We could not verify this payment with Stripe. Please check the Stripe Dashboard before treating this order as paid.</p>';
        renderOrderTubes(order);
      }
    });
  </script>
</body>
</html>
