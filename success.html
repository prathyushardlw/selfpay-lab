<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="brand-bar">
    <div class="brand-bar-inner">
      <h1 class="brand-title">Self Pay Lab Registration</h1>
    </div>
  </div>

  <div class="container">
    <div class="confirmation-screen">
      <div class="confirm-icon">&#10004;</div>
      <h2 class="confirm-title">Payment Successful!</h2>
      <div class="order-details" id="orderDetails">
        <p style="text-align:center;color:#666;">Loading order details...</p>
      </div>
      <div class="tube-section" id="tubeSection"></div>
      <div class="print-actions">
        <button type="button" class="btn btn-pay btn-full" id="printLabelBtn">&#128424; Print Label</button>
        <button type="button" class="btn btn-cancel btn-full" id="printInvoiceBtn">&#128424; Print Invoice</button>
      </div>
    </div>
  </div>

  <script>
    const tubeColors = {
      "Lavender": "#9b59b6",
      "Green": "#27ae60",
      "Red": "#e74c3c",
      "Yellow (Urine Cup)": "#f1c40f"
    };

    function getOrderId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('order_id');
    }

    function loadOrder() {
      const orderId = getOrderId();
      const orders = JSON.parse(localStorage.getItem('testgo_orders') || '[]');
      const order = orders.find(o => o.orderId === orderId);

      if (!order) {
        document.getElementById('orderDetails').innerHTML = '<p style="text-align:center;color:#c00;">Order not found. It may have been submitted from another device.</p>';
        return null;
      }

      // Mark as paid
      order.status = 'paid';
      order.paidAt = new Date().toLocaleString();
      localStorage.setItem('testgo_orders', JSON.stringify(orders));

      return order;
    }

    function renderOrder(order) {
      const details = document.getElementById('orderDetails');
      let html = '';
      html += `<div class="detail-row"><span class="detail-label">Order ID</span><span class="detail-value">${order.orderId}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Patient</span><span class="detail-value">${order.firstName} ${order.lastName}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">DOB</span><span class="detail-value">${order.dob}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${order.email}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${order.phone}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Tests</span><span class="detail-value">${order.tests.map(t => t.name).join(', ')}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Total Paid</span><span class="detail-value" style="color:#059669;font-weight:700;">$${order.total.toFixed(2)}</span></div>`;
      html += `<div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="color:#059669;font-weight:700;">PAID</span></div>`;
      details.innerHTML = html;

      // Tubes
      const tubeSection = document.getElementById('tubeSection');
      const tubesNeeded = {};
      order.tests.forEach(t => {
        if (!tubesNeeded[t.tube]) tubesNeeded[t.tube] = [];
        tubesNeeded[t.tube].push(t.name);
      });
      let tubeHtml = '<h3>Tubes Required</h3>';
      Object.keys(tubesNeeded).forEach(tube => {
        const color = tubeColors[tube] || '#999';
        tubeHtml += `<div class="tube-item"><span class="tube-color" style="background:${color}"></span><span><strong>${tube}</strong> — ${tubesNeeded[tube].join(', ')}</span></div>`;
      });
      tubeSection.innerHTML = tubeHtml;
    }

    function printLabel(order) {
      const printWindow = window.open('', '_blank', 'width=400,height=250');
      printWindow.document.write(`<html><head><title>Patient Label</title>
        <style>body{margin:0;padding:16px;font-family:Arial,sans-serif;}.label{border:2px solid #000;padding:12px 16px;display:inline-block;}.label-name{font-size:18px;font-weight:bold;margin-bottom:4px;}.label-dob{font-size:14px;color:#333;}.label-id{font-size:11px;color:#666;margin-top:4px;}</style></head>
        <body><div class="label"><div class="label-name">${order.lastName}, ${order.firstName}</div><div class="label-dob">DOB: ${order.dob}</div><div class="label-id">${order.orderId}</div></div>
        <script>window.onload=function(){window.print();}<\/script></body></html>`);
      printWindow.document.close();
    }

    function printInvoice(order) {
      let testsRows = order.tests.map(t => `<tr><td>${t.name}</td><td style="text-align:right">$${t.price.toFixed(2)}</td></tr>`).join('');
      const printWindow = window.open('', '_blank', 'width=600,height=700');
      printWindow.document.write(`<html><head><title>Invoice - ${order.orderId}</title>
        <style>body{margin:0;padding:24px;font-family:Arial,sans-serif;font-size:13px;color:#333;}h2{margin:0 0 4px;font-size:18px;}.subtitle{color:#666;margin-bottom:16px;font-size:12px;}.info{margin-bottom:16px;}.info p{margin:2px 0;}table{width:100%;border-collapse:collapse;margin-bottom:12px;}th,td{padding:6px 8px;border-bottom:1px solid #ddd;text-align:left;}th{background:#f5f5f5;font-weight:600;}.total-row td{border-top:2px solid #333;font-weight:bold;font-size:14px;}.footer{margin-top:20px;font-size:11px;color:#888;}</style></head>
        <body><h2>Self Pay Invoice</h2><div class="subtitle">Order: ${order.orderId} | Date: ${order.paidAt || ''}</div>
        <div class="info"><p><strong>Patient:</strong> ${order.firstName} ${order.lastName}</p><p><strong>DOB:</strong> ${order.dob}</p><p><strong>Email:</strong> ${order.email}</p><p><strong>Phone:</strong> ${order.phone}</p></div>
        <table><thead><tr><th>Test</th><th style="text-align:right">Amount</th></tr></thead><tbody>${testsRows}<tr class="total-row"><td>Total</td><td style="text-align:right">$${order.total.toFixed(2)}</td></tr></tbody></table>
        <div class="footer">Thank you for your visit.</div>
        <script>window.onload=function(){window.print();}<\/script></body></html>`);
      printWindow.document.close();
    }

    document.addEventListener('DOMContentLoaded', () => {
      const order = loadOrder();
      if (order) {
        renderOrder(order);
        document.getElementById('printLabelBtn').addEventListener('click', () => printLabel(order));
        document.getElementById('printInvoiceBtn').addEventListener('click', () => printInvoice(order));
      }
    });
  </script>
</body>
</html>
